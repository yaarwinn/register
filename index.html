}

/* TOP BAR */
.topbar{
position:fixed;

width:100%;
background:#ffcc00;
color:#000;

padding:10px;
font-weight:bold;

}

/* HEADER */
header{

}

}

/* CTA */
.cta a{

padding:15px 35px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
display:inline-block;
margin-top:20px;
cursor:pointer;
}

/* SECTION */
.section{
padding:40px 20px;
max-width:1000px;
margin:auto;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}
.card{

/* FLOAT BUTTON */
.float-btn{
position:fixed;

background:#ffcc00;
color:#000;
padding:15px 20px;

font-weight:bold;

}

/* EMBED */
#embedContainer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
z-index:2000;
background:#000;
}

/* LOADER */
#loader{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:20px;
color:#ffcc00;
}

/* IFRAME */
#embedContainer iframe{
width:100%;
height:100%;
border:none;
display:none;
}

/* BACK BUTTON */
.back-btn{
position:absolute;
top:15px;
left:15px;
background:#ffcc00;
color:#000;
padding:8px 15px;
border-radius:20px;
font-weight:bold;
cursor:pointer;
z-index:3000;
}

<body>

<div class="card">📱 Mobile Friendly</div>
</div>
</div>

<a class="float-btn" onclick="openSite()">JOIN NOW</a>

<!-- EMBED -->
<div id="embedContainer">
<div class="back-btn" onclick="closeSite()">← Back</div>
<div id="loader">Loading secure connection...</div>
<iframe id="yaarFrame"></iframe>
</div>

<script>
function openSite(){
document.querySelectorAll(".mainContent").forEach(el=>el.style.display="none");

let container = document.getElementById("embedContainer");
let frame = document.getElementById("yaarFrame");
let loader = document.getElementById("loader");

container.style.display="block";

frame.src = "https://yaarwin.org/#/register?invitationCode=73432649713";

// Show iframe when loaded
frame.onload = function(){
loader.style.display="none";
frame.style.display="block";
};
}

// fallback if iframe blocked
setTimeout(()=>{
let frame = document.getElementById("yaarFrame");
if(frame.style.display === "none"){
window.location.href = frame.src;
}
},5000);

function closeSite(){
document.getElementById("embedContainer").style.display="none";
document.querySelectorAll(".mainContent").forEach(el=>el.style.display="block");
}
</script>
